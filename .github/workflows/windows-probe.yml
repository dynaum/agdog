name: Windows probe

# Temporary. Runs the Windows-only integration tests on a real Windows host
# while they are being developed. Folded into ci.yml once green.
on:
  workflow_dispatch:
  push:
    branches: [windows-probe]

jobs:
  probe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Windows platform tests
        run: cargo test --test windows_platform -- --nocapture --test-threads=1
      - name: Full suite
        run: cargo test --all-targets
      - name: agdog watch over the named pipe
        shell: pwsh
        # Start the TUI headless so the pipe server is up, then subscribe.
        run: |
          $ErrorActionPreference = 'Continue'
          cargo build --release
          $tui = Start-Process -PassThru -FilePath ".\target\release\agdog.exe"
          Start-Sleep -Seconds 4
          $watch = Start-Process -PassThru -RedirectStandardOutput watch.log `
            -FilePath ".\target\release\agdog.exe" -ArgumentList 'watch'
          Start-Sleep -Seconds 8
          Stop-Process -Id $watch.Id -Force -ErrorAction SilentlyContinue
          Stop-Process -Id $tui.Id -Force -ErrorAction SilentlyContinue
          Write-Host '--- watch.log ---'
          if (Test-Path watch.log) { Get-Content watch.log } else { Write-Host '(no output)' }
