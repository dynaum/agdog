name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both macOS targets build on Apple Silicon runners; the Intel binary
          # cross-compiles (macos-13 Intel runners are retired/backlogged).
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf "agdog-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" agdog
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/agdog.exe" `
            -DestinationPath "agdog-${{ github.ref_name }}-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            agdog-*.tar.gz
            agdog-*.zip

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: (cd dist && sha256sum agdog-* > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
